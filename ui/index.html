<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICS Risk Auditor | Firmware-Aware</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-200 min-h-screen">

    <div class="max-w-5xl mx-auto py-12 px-6">
        <header class="flex justify-between items-center border-b border-slate-800 pb-8 mb-12">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-white italic uppercase">ICS <span class="text-blue-500 font-extrabold">Auditor</span></h1>
                <p class="text-slate-500 text-[10px] mt-1 font-mono uppercase tracking-[0.2em]">Firmware-Aware Scan Engine v2.3</p>
            </div>
            <button onclick="downloadTemplate()" class="text-[10px] font-bold text-blue-400 hover:text-white uppercase tracking-widest border border-blue-400/20 hover:border-blue-500 px-5 py-2.5 rounded-lg transition-all bg-blue-500/5">
                Download CSV Template
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-widest">1. Asset Inventory Upload</label>
                <input type="file" id="csvFile" accept=".csv" 
                    class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer">
                <p class="text-[9px] text-slate-600 mt-3 italic">* Template includes: Asset_ID, Make, Model, Firmware, Location</p>
            </div>

            <div class="flex flex-col justify-center">
                <button onclick="runAudit()" id="scanBtn" 
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-95 text-md uppercase tracking-wider">
                    Generate Risk Report
                </button>
                <div id="status" class="mt-4 text-center font-mono text-[10px] text-yellow-500 hidden uppercase tracking-[0.3em] animate-pulse">
                    Scanning Assets...
                </div>
            </div>
        </div>

        <div id="reportArea" class="hidden mb-12 p-6 bg-green-500/10 border border-green-500/30 rounded-2xl flex justify-between items-center">
            <div>
                <span class="text-green-400 font-bold text-sm uppercase italic tracking-wider">Scan Complete</span>
                <p class="text-xs text-slate-400 mt-1">ピンポイント (Pinpoint) accuracy achieved using firmware matching.</p>
            </div>
            <button onclick="downloadReport()" 
                class="bg-green-600 hover:bg-green-500 text-white text-[10px] font-black py-3 px-8 rounded-full uppercase shadow-lg shadow-green-900/40">
                Export Final Report (.csv)
            </button>
        </div>

        <div class="bg-slate-900/80 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-slate-800/50 text-slate-500 text-[10px] uppercase tracking-[0.2em]">
                    <tr>
                        <th class="p-5">Asset Details</th>
                        <th class="p-5 text-center border-x border-slate-800/50">Firmware</th>
                        <th class="p-5 text-center">Score</th>
                        <th class="p-5 text-right font-bold italic">Tactic</th>
                    </tr>
                </thead>
                <tbody id="auditTable" class="text-sm">
                    <tr>
                        <td colspan="4" class="p-20 text-center text-slate-700 italic font-mono text-[10px] uppercase tracking-widest">
                            Ready for firmware-aware analysis...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://icsvulscore.cloudflare-rushikeshk155.workers.dev";
        let resultsData = [];

        // 1. UPDATED TEMPLATE GENERATOR
        function downloadTemplate() {
            const csvRows = [
                ["Asset_ID", "Make", "Model", "Firmware", "Location"],
                ["PLC-01", "Siemens", "S7-1200", "4.2.1", "Substation Alpha"],
                ["HMI-01", "Schneider Electric", "Magelis", "2.1", "Control Room"]
            ];
            const csvContent = csvRows.map(e => e.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = 'ICS_Asset_Template_v2.csv';
            link.click();
        }

        // 2. UPDATED AUDIT ENGINE
        async function runAudit() {
            const fileInput = document.getElementById('csvFile');
            if (!fileInput.files[0]) return alert("Please upload your inventory CSV.");

            const table = document.getElementById('auditTable');
            const status = document.getElementById('status');
            const reportArea = document.getElementById('reportArea');

            table.innerHTML = "";
            resultsData = [];
            status.classList.remove('hidden');
            reportArea.classList.add('hidden');

            Papa.parse(fileInput.files[0], {
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    const assets = results.data;
                    
                    for (let i = 0; i < assets.length; i++) {
                        const asset = assets[i];
                        status.innerText = `ANALYZING: ${asset.Make} ${asset.Model} (${i+1}/${assets.length})`;
                        
                        // Extract Firmware from CSV
                        const fw = asset.Firmware || asset.firmware || "";
                        
                        try {
                            const res = await fetch(`${WORKER_URL}/?make=${encodeURIComponent(asset.Make)}&model=${encodeURIComponent(asset.Model)}&firmware=${encodeURIComponent(fw)}`);
                            const data = await res.json();
                            
                            const top = data.vulnerabilities[0] || {};
                            const entry = {
                                ...asset,
                                vuln_count: data.count,
                                risk_score: top.ics_weighted_score || 0,
                                tactic: top.tactic || "None",
                                mitigation: top.mitigation || "N/A"
                            };
                            
                            resultsData.push(entry);
                            renderRow(entry, fw);
                        } catch (err) {
                            console.error(err);
                        }
                    }
                    status.classList.add('hidden');
                    reportArea.classList.remove('hidden');
                }
            });
        }

        function renderRow(r, fw) {
            const table = document.getElementById('auditTable');
            let scoreColor = "text-slate-500";
            if (r.risk_score >= 9) scoreColor = "text-red-500 font-black drop-shadow-[0_0_8px_rgba(239,68,68,0.3)]";
            else if (r.risk_score >= 7) scoreColor = "text-orange-500 font-bold";

            table.innerHTML += `
                <tr class="border-t border-slate-800/50 hover:bg-blue-500/5 transition-all group">
                    <td class="p-5">
                        <span class="block text-white font-bold text-xs uppercase tracking-tight">${r.Asset_ID || 'UNTITLED'}</span>
                        <span class="text-[9px] text-slate-500 font-mono uppercase">${r.Make} ${r.Model}</span>
                    </td>
                    <td class="p-5 text-center border-x border-slate-800/50 font-mono text-[10px] text-blue-400">
                        ${fw || 'ANY'}
                    </td>
                    <td class="p-5 text-center ${scoreColor} text-xl mono tracking-tighter">
                        ${r.risk_score > 0 ? r.risk_score : '--'}
                    </td>
                    <td class="p-5 text-right">
                        <span class="text-[9px] bg-slate-800 px-2 py-1 rounded border border-slate-700 text-slate-500 uppercase font-black tracking-widest group-hover:text-slate-300 transition-colors">
                            ${r.tactic}
                        </span>
                    </td>
                </tr>
            `;
        }

        function downloadReport() {
            const csv = Papa.unparse(resultsData);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ICS_Audit_Report_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
    </script>
</body>
</html>
