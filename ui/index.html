<!-- This wrapper holds your formatted report structure -->
<div id="executive-report-template" style="padding: 40px; font-family: Arial, sans-serif; background-color: #fff; color: #000;">
  
  <!-- Header Banner -->
  <div style="background-color: #0b1120; padding: 20px; color: white; margin-bottom: 30px;">
    <h2>INDUSTRIAL VULNERABILITY AUDIT REPORT</h2>
    <p>Compliance Framework: IEC 62443</p>
  </div>

  <!-- Charts & Metrics Container -->
  <div style="display: flex; margin-bottom: 40px;">
    <div style="flex: 1;">
      <h4>Risk Breakdown Matrix</h4>
      <!-- Chart.js or Recharts targets render perfectly here -->
      <canvas id="cvssDistributionChart" width="200" height="200"></canvas>
    </div>
    <div style="flex: 1; padding-left: 20px;">
      <h4>Executive Summary Metrics</h4>
      <p><b>Total Processed Assets:</b> <span id="lblTotalAssets">0</span></p>
      <p><b>Max Severity Score Detected:</b> <span id="lblMaxCvss">0.0</span></p>
    </div>
  </div>

  <!-- Asset Telemetry Data Table -->
  <h4>Prioritized Vulnerability Line-Items</h4>
  <table style="width: 100%; border-collapse: collapse;">
    <thead>
      <tr style="background-color: #f1f5f9; text-align: left;">
        <th style="padding: 8px; border: 1px solid #cbd5e1;">CVE ID</th>
        <th style="padding: 8px; border: 1px solid #cbd5e1;">Target Component</th>
        <th style="padding: 8px; border: 1px solid #cbd5e1;">CVSS Score</th>
      </tr>
    </thead>
    <tbody id="reportTableBody">
      <!-- Generated CSV calculation array rows inject dynamically here -->
    </tbody>
  </table>
</div>
